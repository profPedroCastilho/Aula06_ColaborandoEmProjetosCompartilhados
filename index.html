<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel 3D</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
   
    <h1>Carrossel de Imagens 3D</h1>
    <div class="carrossel-container">
        <button class="anterior">&#10094;</button>
    <div class="carrossel">
        <div class="slide">
            <a href="imagens/Imagem1.jpg" target="_blank">
                <img src="imagens/Imagem1.jpg" alt="Imagem 1">
            </a>
            <div class="info">
                <h2>Leão</h2>
                <p>Rei da Floresta.</p>
            </div>
        </div>
        <div class="slide">
            <a href="imagens/Imagem2.jpg" target="_blank">
                <img src="imagens/Imagem2.jpg" alt="Imagem 2">
            </a>
            <div class="info">
                <h2>Foca</h2>
                <p>Gostam de Brincar.</p>
            </div>
        </div>
        <div class="slide">
            <a href="imagens/Imagem3.jpg" target="_blank">
                <img src="imagens/Imagem3.jpg" alt="Imagem 3">
            </a>
            <div class="info">
                <h2>Casa de Campo</h2>
                <p>Bom para Descansar.</p>
            </div>
        </div>
 
        <div class="slide">
            <a href="imagens/Imagem4.jpg" target="_blank">
                <img src="imagens/Imagem4.jpg"Imagem 4">
            </a>
            <div class="info">
                <h2>Peixe</h2>
                <p>São lindo e vivem no rio ou mar.</p>
            </div>
        </div>
    </div>
    <button class="proximo">&#10095;</button>
    </div>
 
    <script src="script.js"></script>
   
</body>
</html>
